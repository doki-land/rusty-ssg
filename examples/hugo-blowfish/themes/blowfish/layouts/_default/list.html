{{ define "main" }}
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <ul>
        {{ range .Pages }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                {{ if .Date }}
                    <span>{{ .Date.Format "2006-01-02" }}</span>
                {{ end }}
            </li>
        {{ end }}
    </ul>
{{ end }}
